name: CIMS Build and Deploy

on:
  push:
    branches: [ "main", "fix/stack-not-pulling-new-images" ]

permissions:
  packages: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - run-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
          use: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Api Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/TuDa.CIMS.Api/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/projectcims/cims-api:latest
            ghcr.io/projectcims/cims-api:${{ github.sha }}
          secret-envs: "ConnectionStrings:CIMS=${{ secrets.DB_CONNECTION_STRING }}"

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/TuDa.CIMS.Web/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/projectcims/cims-web:latest
            ghcr.io/projectcims/cims-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: create env file
        run: |
          echo "GIT_COMMIT_HASH=${{ github.sha }}" >> ./envfile

      - name: Docker Compose Deploy
        uses: alex-ac/github-action-ssh-docker-compose@master
        with:
          docker_compose_prefix: cims
          docker_compose_filename: docker-compose.yml
          ssh_host: ${{ secrets.DEV_IP_ADDRESS }}
          ssh_user: deploy
          ssh_private_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          docker_compose_down: 'true'
